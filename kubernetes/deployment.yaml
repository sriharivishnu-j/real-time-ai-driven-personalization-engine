apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-personalization-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-personalization-backend
  template:
    metadata:
      labels:
        app: ai-personalization-backend
    spec:
      containers:
      - name: backend
        image: myrepo/ai-personalization-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/db"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: KAFKA_BROKER
          value: "kafka:9092"
